<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VFG STORE | Enterprise Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020202;
            --card: #0a0a0a;
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --grad: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- MENÚ SUPERIOR PEGADO --- */
        header {
            position: sticky; top: 0; width: 100%; z-index: 1000;
            background: rgba(2, 2, 2, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto; display: flex; align-items: center; padding: 15px 20px; gap: 20px;
        }
        .logo { font-weight: 800; font-size: 1.2rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
        
        .menu-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding: 5px 0;
            mask-image: linear-gradient(to right, black 85%, transparent 100%);
        }
        .nav-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-dim);
            padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600;
            white-space: nowrap; transition: 0.3s; font-size: 0.85rem;
        }
        .nav-btn.active { background: var(--grad); color: #000; border: none; }

        /* --- CONTENIDO --- */
        main { max-width: 1200px; margin: 0 auto; padding: 40px 20px 100px; min-height: 100vh; }
        
        .section-intro { margin-bottom: 40px; text-align: center; }
        .section-intro h2 { font-size: 2.2rem; font-weight: 800; }
        .section-intro p { color: var(--text-dim); margin-top: 5px; }

        .cat-title { 
            font-size: 0.9rem; font-weight: 800; color: var(--accent); 
            text-transform: uppercase; margin: 40px 0 20px; letter-spacing: 1px;
            display: flex; align-items: center; gap: 15px;
        }
        .cat-title::after { content: ""; height: 1px; flex: 1; background: var(--border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .item-name { font-size: 0.95rem; font-weight: 700; color: var(--text-dim); }
        .item-price { font-size: 1.5rem; font-weight: 800; margin: 10px 0 20px; color: #fff; }
        .item-price::before { content: "$"; font-size: 1rem; color: var(--accent); margin-right: 4px; }

        .buy-btn {
            width: 100%; background: #fff; color: #000; border: none; padding: 12px;
            border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .buy-btn:hover { background: var(--accent); }

        /* --- MODAL --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(10px); padding: 20px; }
        .modal { background: #080808; border: 1px solid var(--border); width: 100%; max-width: 400px; padding: 30px; border-radius: 24px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; background: #111; border: 1px solid var(--border); color: #fff; outline: none; }
        .confirm-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--grad); color: #fff; font-weight: 800; border: none; cursor: pointer; }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .section-intro h2 { font-size: 1.8rem; }
            .item-price { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">VFG STORE</div>
            <div class="menu-scroll" id="navbar">
                <button class="nav-btn active" onclick="render('home')">🏠 Inicio</button>
                <button class="nav-btn" onclick="render('ff')">💎 Free Fire</button>
                <button class="nav-btn" onclick="render('roblox')">🚀 Roblox</button>
                <button class="nav-btn" onclick="render('bs')">🔫 Block Strike</button>
                <button class="nav-btn" onclick="render('ig')">📸 Instagram</button>
                <button class="nav-btn" onclick="render('tt')">🎵 TikTok</button>
                <button class="nav-btn" onclick="render('yt')">📹 YouTube</button>
                <button class="nav-btn" onclick="render('stream')">📺 Streaming</button>
                <button class="nav-btn" onclick="render('apps')">🛠️ Apps</button>
                <button class="nav-btn" onclick="render('wsp')">🟢 WhatsApp</button>
            </div>
        </div>
    </header>

    <main id="app"></main>

    <div class="overlay" id="checkout">
        <div class="modal">
            <h3 id="m-title">Producto</h3>
            <p id="m-price" style="color:var(--accent); font-weight:800; margin: 10px 0 20px;"></p>
            <input type="text" id="m-user" placeholder="Usuario / ID / Enlace">
            <select id="m-pay">
                <option value="">Método de Pago</option>
                <option>Mercado Pago</option>
                <option>Transferencia</option>
                <option>Binance (USDT)</option>
            </select>
            <button class="confirm-btn" onclick="send()">Confirmar WhatsApp</button>
            <button onclick="closeModal()" style="background:transparent; color:#444; width:100%; margin-top:15px; border:none; cursor:pointer; font-weight:700;">Cerrar</button>
        </div>
    </div>

    <script>
        const DATA = {
            home: { t: "VFG STORE", d: "Servicios Digitales Premium", rows: [{ n: "Destacados", ph: "Info", items: [["Consultar Personalizado", "0"]] }] },
            ff: {
                t: "Free Fire 💎", d: "Carga rápida por ID",
                rows: [
                    { n: "Stock por ID ✨", ph: "ID Jugador", items: [["100💎", "1.100"], ["341💎", "3.300"], ["572💎", "5.300"], ["1.166💎", "10.300"], ["2.398💎", "20.300"], ["6.160💎", "55.000"]] },
                    { n: "Diamantes Infinitos ♾️", ph: "ID Jugador", items: [["100💎", "1.450"], ["300💎", "5.000"], ["500💎", "7.000"], ["1k💎", "12.680"], ["2k💎", "25.000"], ["6k💎", "60.000"]] },
                    { n: "Extra", ph: "ID Jugador", items: [["Pase Booyah", "3.500"]] }
                ]
            },
            roblox: {
                t: "Roblox 🚀", d: "Robux via Gamepass",
                rows: [{ n: "Paquetes", ph: "Usuario Roblox", items: [["100 Robux", "1.500"], ["400 Robux", "5.000"], ["800 Robux", "9.000"], ["1.000 Robux", "12.000"], ["2.000 Robux", "20.000"], ["4.000 Robux", "370.000"]] }]
            },
            bs: {
                t: "Block Strike 🔫", d: "Oro oficial para tu cuenta",
                rows: [{ n: "Oro", ph: "ID de BS", items: [["100 Oro", "1.200"], ["500 Oro", "4.500"], ["1.000 Oro", "8.000"], ["2.500 Oro", "15.000"], ["5.000 Oro", "28.000"]] }]
            },
            ig: {
                t: "Instagram 📸", d: "Seguidores y Likes reales",
                rows: [
                    { n: "Seguidores", ph: "Link Perfil", items: [["100 Seg", "800"], ["300 Seg", "1.600"], ["500 Seg", "2.000"], ["1k Seg", "3.500"], ["5k Seg", "7.000"], ["10k Seg", "10.000"], ["20k Seg", "18.500"]] },
                    { n: "Likes", ph: "Link Post", items: [["100 Likes", "500"], ["1k Likes", "2.000"], ["5k Likes", "5.000"], ["10k Likes", "10.000"]] }
                ]
            },
            tt: {
                t: "TikTok 🎵", d: "Viraliza tu contenido",
                rows: [
                    { n: "Vistas", ph: "Link Video", items: [["1k Vistas", "500"], ["10k Vistas", "3.000"], ["100k Vistas", "8.500"], ["1M Vistas", "50.000"]] },
                    { n: "Likes", ph: "Link Video", items: [["100 Likes", "500"], ["1k Likes", "2.500"], ["10k Likes", "15.000"]] }
                ]
            },
            yt: {
                t: "YouTube 📹", d: "Crecimiento de canal",
                rows: [
                    { n: "Subs", ph: "Link Canal", items: [["100 Subs", "1.500"], ["1k Subs", "15.000"]] },
                    { n: "Vistas", ph: "Link Video", items: [["1k Vistas", "5.500"], ["10k Vistas", "30.000"]] }
                ]
            },
            stream: {
                t: "Streaming 📺", d: "Cuentas Premium 4K",
                rows: [{ n: "Cuentas", ph: "WhatsApp", items: [["Netflix", "8.000"], ["Disney+", "7.000"], ["HBO Max", "7.500"], ["Paramount+", "5.500"], ["Crunchyroll", "4.000"], ["Apple TV", "13.000"]] }]
            },
            apps: {
                t: "Apps 🛠️", d: "Herramientas Pro",
                rows: [{ n: "Pro", ph: "Correo", items: [["Canva Año", "50.000"], ["CapCut Pro", "7.000"], ["ChatGPT Mes", "5.500"]] }]
            },
            wsp: {
                t: "WhatsApp 🟢", d: "Miembros y Reacciones",
                rows: [{ n: "Miembros", ph: "Link Canal", items: [["100 Miembros", "1.500"], ["1k Miembros", "9.500"]] }]
            }
        };

        function render(id) {
            const app = document.getElementById('app');
            const data = DATA[id];
            
            // UI Active
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event?.currentTarget?.classList.add('active');

            let html = `<div class="section-intro"><h2>${data.t}</h2><p>${data.d}</p></div>`;
            data.rows.forEach(r => {
                html += `<div class="cat-title">${r.n}</div><div class="grid">`;
                r.items.forEach(i => {
                    html += `<div class="card"><div><div class="item-name">${i[0]}</div><div class="item-price">${i[1]}</div></div><button class="buy-btn" onclick="openMod('${i[0]} ${data.t}', '${i[1]}', '${r.ph}')">Comprar</button></div>`;
                });
                html += `</div>`;
            });
            app.innerHTML = html;
            window.scrollTo(0,0);
        }

        let selI, selP;
        function openMod(n, p, ph) {
            selI = n; selP = p;
            document.getElementById('m-title').innerText = n;
            document.getElementById('m-price').innerText = "$" + p;
            document.getElementById('m-user').placeholder = ph;
            document.getElementById('checkout').style.display = 'flex';
        }

        function closeModal() { document.getElementById('checkout').style.display = 'none'; }

        function send() {
            const u = document.getElementById('m-user').value;
            const p = document.getElementById('m-pay').value;
            if(!u || !p) return alert("Completa los datos");
            const msg = `🚀 *PEDIDO VFG STORE*\n📦 *${selI}*\n💰 *Precio:* $${selP}\n👤 *Dato:* ${u}\n💳 *Pago:* ${p}`;
            window.open(`https://wa.me/5492984706726?text=${encodeURIComponent(msg)}`, '_blank');
        }

        render('home');
    </script>
</body>
</html>
