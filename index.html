<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VFG STORE | Elite Digital Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --sidebar: #080808;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --card: #0f0f0f;
            --text: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --grad: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Scrollbar invisible para estética premium */
        *::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden; /* El body no scrollea, solo el main */
        }

        /* --- POPUP --- */
        #popup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; backdrop-filter: blur(15px); transition: 0.4s;
        }
        .popup-box { position: relative; max-width: 380px; width: 85%; transform: scale(1); }
        .popup-box img { width: 100%; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .cerrar-popup {
            position: absolute; top: -15px; right: -15px; background: var(--accent);
            color: #000; width: 36px; height: 36px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: 800;
        }

        /* --- NAVEGACIÓN (Escritorio: Lateral | Móvil: Inferior) --- */
        nav {
            width: 280px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 40px 20px; z-index: 1000;
        }
        .nav-logo h1 { font-size: 1.4rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; text-align: center; }

        .menu-links { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .menu-btn {
            width: 100%; padding: 14px 18px; margin-bottom: 8px; background: transparent;
            border: 1px solid transparent; border-radius: 16px; color: var(--text-dim);
            text-align: left; cursor: pointer; font-weight: 600; transition: 0.3s;
            display: flex; align-items: center; gap: 12px;
        }
        .menu-btn.active { background: rgba(0,242,255,0.08); color: var(--accent); border-color: rgba(0,242,255,0.15); }

        /* --- CONTENEDOR PRINCIPAL --- */
        main {
            flex: 1; height: 100vh; overflow-y: scroll; 
            -webkit-overflow-scrolling: touch; /* Scroll fluido iOS */
            padding: 60px; scroll-behavior: smooth;
        }

        .page-content { display: none; animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .page-content.active { display: block; }

        .section-header { margin-bottom: 40px; }
        .section-header h2 { font-size: 2.6rem; font-weight: 800; letter-spacing: -1px; }
        .section-header p { color: var(--text-dim); font-size: 1.1rem; margin-top: 8px; }

        .sub-title { font-size: 0.9rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin: 40px 0 20px; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
        .sub-title::after { content: ""; height: 1px; flex: 1; background: var(--border); }

        /* --- GRILLA Y CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; transition: 0.4s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .item-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
        .price { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 20px; }
        .price::before { content: "$"; font-size: 1rem; color: var(--accent); margin-right: 4px; }

        .buy-btn {
            background: #fff; color: #000; border: none; padding: 14px;
            border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s;
            font-size: 0.85rem; text-transform: uppercase;
        }
        .buy-btn:hover { background: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 20000;
            backdrop-filter: blur(12px); padding: 20px;
        }
        .modal-content {
            background: #0a0a0a; width: 100%; max-width: 420px; padding: 40px;
            border-radius: 32px; border: 1px solid var(--border);
        }
        input, select {
            width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 16px;
            background: #151515; border: 1px solid var(--border); color: #fff; font-size: 1rem; outline: none;
        }
        .confirm-btn {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            background: var(--grad); color: #fff; font-weight: 800; cursor: pointer;
        }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            nav {
                width: 100%; height: 80px; padding: 0 10px; border-right: none;
                border-top: 1px solid var(--border); position: fixed; bottom: 0;
                flex-direction: row; background: rgba(8,8,8,0.9); backdrop-filter: blur(20px);
            }
            .nav-logo { display: none; }
            .menu-links { display: flex; align-items: center; gap: 5px; overflow-x: auto; overflow-y: hidden; height: 100%; }
            .menu-btn {
                flex-direction: column; min-width: 80px; padding: 10px; font-size: 0.65rem;
                margin-bottom: 0; text-align: center; gap: 5px; border-radius: 12px;
            }
            .menu-btn span { display: block; }
            main { padding: 40px 20px 120px; } /* Extra padding for bottom nav */
            .section-header h2 { font-size: 2.1rem; }
            .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .card { padding: 18px; }
            .price { font-size: 1.3rem; }
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="popup">
        <div class="popup-box">
            <span class="cerrar-popup" onclick="cerrarPopup()">✕</span>
            <img src="promo.jpg" alt="Oferta VFG">
        </div>
    </div>

    <nav>
        <div class="nav-logo"><h1>VFG STORE</h1></div>
        <div class="menu-links">
            <button class="menu-btn active" onclick="navTo('home')">🏠 <span>Inicio</span></button>
            <button class="menu-btn" onclick="navTo('ff')">💎 <span>FF</span></button>
            <button class="menu-btn" onclick="navTo('roblox')">🚀 <span>Robux</span></button>
            <button class="menu-btn" onclick="navTo('bs')">🔫 <span>BlockS</span></button>
            <button class="menu-btn" onclick="navTo('ig')">📸 <span>Insta</span></button>
            <button class="menu-btn" onclick="navTo('tt')">🎵 <span>TikTok</span></button>
            <button class="menu-btn" onclick="navTo('stream')">📺 <span>TV</span></button>
            <button class="menu-btn" onclick="navTo('apps')">🛠️ <span>Apps</span></button>
            <button class="menu-btn" onclick="navTo('yt')">📹 <span>YT</span></button>
            <button class="menu-btn" onclick="navTo('wsp')">🟢 <span>WSP</span></button>
        </div>
    </nav>

    <main id="mainView"></main>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3 id="m-name">Producto</h3>
            <p id="m-price" style="color:var(--accent); font-weight:800; font-size: 1.4rem; margin: 10px 0 25px;"></p>
            <input type="text" id="u-data" placeholder="Dato requerido">
            <select id="u-pay">
                <option value="">Método de Pago</option>
                <option>Mercado Pago</option>
                <option>Transferencia</option>
                <option>Binance (USDT)</option>
            </select>
            <button class="confirm-btn" onclick="executeOrder()">Confirmar WhatsApp</button>
            <button onclick="closeModal()" style="background:transparent; color:#444; border:none; width:100%; margin-top:20px; font-weight:700; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        const DB = {
            ff: {
                title: "Free Fire 💎", desc: "Diamantes directos a tu cuenta.",
                groups: [
                    { name: "Por ID ✨", ph: "ID Jugador", items: [["100💎", "1.100"], ["341💎", "3.300"], ["572💎", "5.300"], ["1.166💎", "10.300"], ["2.398💎", "20.300"], ["6.160💎", "55.000"]] },
                    { name: "Infinitos ♾️", ph: "ID Jugador", items: [["100💎", "1.450"], ["300💎", "5.000"], ["500💎", "7.000"], ["1k💎", "12.680"], ["2k💎", "25.000"], ["6k💎", "60.000"]] },
                    { name: "Pases", ph: "ID Jugador", items: [["Pase Booyah", "3.500"]] }
                ]
            },
            roblox: {
                title: "Roblox 🚀", desc: "Robux via Gamepass rápido.",
                groups: [{ name: "Paquetes", ph: "Usuario Roblox", items: [["100", "1.500"], ["400", "5.000"], ["800", "9.000"], ["1k", "12.000"], ["2k", "20.000"], ["4k", "370.000"]] }]
            },
            bs: {
                title: "Block Strike 🔫", desc: "Oro para tu cuenta.",
                groups: [{ name: "Oro", ph: "ID o Usuario BS", items: [["100 Oro", "1.200"], ["500 Oro", "4.500"], ["1000 Oro", "8.000"], ["2500 Oro", "15.000"], ["5000 Oro", "28.000"]] }]
            },
            ig: {
                title: "Instagram 📸", desc: "Potencia tu perfil hoy.",
                groups: [
                    { name: "Seguidores", ph: "Link Perfil", items: [["100", "800"], ["1k", "3.500"], ["5k", "7.000"], ["10k", "10.000"], ["20k", "18.500"]] },
                    { name: "Likes", ph: "Link Foto/Reel", items: [["100", "500"], ["1k", "2.000"], ["5k", "5.000"], ["20k", "18.000"]] }
                ]
            },
            tt: {
                title: "TikTok 🎵", desc: "Hazte viral.",
                groups: [
                    { name: "Seguidores", ph: "Usuario (@)", items: [["Cada 100", "1.500"]] },
                    { name: "Vistas", ph: "Link Video", items: [["1k", "500"], ["10k", "3.000"], ["100k", "8.500"], ["1M", "50.000"]] }
                ]
            },
            stream: {
                title: "Streaming 📺", desc: "Entrega inmediata.",
                groups: [{ name: "Cuentas", ph: "WhatsApp", items: [["Netflix", "8.000"], ["Disney+", "7.000"], ["Crunchyroll", "4.000"], ["HBO Max", "7.000"], ["Apple TV", "13.000"]] }]
            },
            apps: {
                title: "Apps & AI 🛠️", desc: "Herramientas Pro.",
                groups: [{ name: "Suscripciones", ph: "Correo", items: [["Canva Año", "50.000"], ["CapCut Pro", "7.000"], ["ChatGPT Mes", "5.500"]] }]
            },
            yt: {
                title: "YouTube 📹", desc: "Crece orgánicamente.",
                groups: [{ name: "Subs", ph: "Link Canal", items: [["100", "1.500"], ["500", "7.000"], ["1k", "15.000"]] }]
            },
            wsp: {
                title: "WhatsApp 🟢", desc: "Canales y Reacciones.",
                groups: [{ name: "Miembros", ph: "Link Canal", items: [["100", "1.500"], ["500", "5.000"], ["1k", "9.500"]] }]
            }
        };

        function navTo(pageId) {
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            event?.currentTarget?.classList.add('active');
            
            const main = document.getElementById('mainView');
            if(pageId === 'home') {
                main.innerHTML = `<div class="page-content active"><div class="section-header"><h2>VFG STORE</h2><p>Servicios Digitales de Elite.</p></div><div style="background:var(--card); padding:60px; border-radius:35px; border:1px dashed var(--accent); text-align:center;"><h3>¡Bienvenido!</h3><p style="color:var(--text-dim); margin-top:15px;">Selecciona una categoría para empezar.</p></div></div>`;
                return;
            }

            const data = DB[pageId];
            let html = `<div class="page-content active"><div class="section-header"><h2>${data.title}</h2><p>${data.desc}</p></div>`;
            
            data.groups.forEach(g => {
                html += `<div class="sub-title">${g.name}</div><div class="grid">`;
                g.items.forEach(i => {
                    html += `<div class="card"><div class="item-name">${i[0]}</div><div class="price">${i[1]}</div><button class="buy-btn" onclick="openOrder('${i[0]} ${data.title}', '${i[1]}', '${g.ph}')">Comprar</button></div>`;
                });
                html += `</div>`;
            });
            
            main.innerHTML = html + `</div>`;
            main.scrollTo(0,0);
        }

        let curI = "", curP = "";
        function openOrder(n,p,ph) { 
            curI=n; curP=p; 
            document.getElementById('m-name').innerText=n; 
            document.getElementById('m-price').innerText="$"+p; 
            document.getElementById('u-data').placeholder=ph; 
            document.getElementById('orderModal').style.display='flex'; 
        }

        function closeModal() { document.getElementById('orderModal').style.display='none'; }
        function cerrarPopup() { document.getElementById('popup').style.display='none'; }

        function executeOrder() {
            const d = document.getElementById('u-data').value, p = document.getElementById('u-pay').value;
            if(!d || !p) return alert("Completa los datos");
            const msg = `🚀 *NUEVO PEDIDO VFG*\n📦 *${curI}*\n💰 *Monto:* $${curP}\n👤 *Dato:* ${d}\n💳 *Pago:* ${p}`;
            window.open(`https://wa.me/5492984706726?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => navTo('home');
    </script>
</body>
</html>
