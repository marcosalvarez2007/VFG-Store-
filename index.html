<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFG STORE | Enterprise Digital Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #080808;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.25);
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.07);
            --gradient: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- SISTEMA DE POPUP --- */
        #popup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; backdrop-filter: blur(12px); transition: var(--transition);
        }
        .popup-box { position: relative; max-width: 420px; width: 85%; }
        .popup-box img { width: 100%; border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .cerrar-popup {
            position: absolute; top: -15px; right: -15px; background: var(--accent);
            color: #000; width: 36px; height: 36px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-weight: 800; z-index: 10001;
        }

        /* --- SIDEBAR --- */
        nav {
            width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 40px 20px; z-index: 100;
        }
        .nav-logo { margin-bottom: 45px; text-align: center; }
        .nav-logo h1 { font-size: 1.4rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .menu-links { flex: 1; overflow-y: auto; }
        .menu-btn {
            width: 100%; padding: 15px 20px; margin-bottom: 10px; background: transparent;
            border: 1px solid transparent; border-radius: 16px; color: var(--text-dim);
            text-align: left; cursor: pointer; font-size: 0.95rem; font-weight: 600;
            transition: var(--transition); display: flex; align-items: center; gap: 14px;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.04); color: #fff; }
        .menu-btn.active { background: rgba(0, 242, 255, 0.08); border-color: rgba(0, 242, 255, 0.2); color: var(--accent); }

        /* --- ÁREA DE CONTENIDO --- */
        main { flex: 1; height: 100vh; overflow-y: auto; padding: 60px; scroll-behavior: smooth; position: relative; }
        .page-content { display: none; animation: pageIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .page-content.active { display: block; }

        .section-header { margin-bottom: 50px; border-left: 4px solid var(--accent); padding-left: 25px; }
        .section-header h2 { font-size: 2.5rem; font-weight: 800; }

        .sub-category-title { font-size: 1.1rem; font-weight: 700; margin: 40px 0 20px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .sub-category-title::after { content: ""; height: 1px; flex: 1; background: var(--glass-border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }

        .card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 28px; transition: var(--transition);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .item-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; display: block;}
        .price { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 20px; display: block; }
        .price::before { content: "$"; font-size: 1rem; color: var(--accent); margin-right: 3px; }

        .buy-btn {
            width: 100%; background: #fff; color: #000; border: none; padding: 14px;
            border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .buy-btn:hover { background: var(--accent); }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 20000;
            backdrop-filter: blur(15px);
        }
        .modal-content {
            background: #0d0d0d; width: 90%; max-width: 450px; padding: 40px;
            border-radius: 32px; border: 1px solid var(--glass-border);
        }
        input, select {
            width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 15px;
            background: #151515; border: 1px solid var(--glass-border); color: #fff;
        }
        .confirm-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--gradient); color: #fff; font-weight: 800; cursor: pointer;
        }

        @keyframes pageIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 950px) {
            body { flex-direction: column; }
            nav { width: 100%; padding: 15px; border-right: none; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; }
            .menu-links { display: flex; overflow-x: auto; gap: 10px; }
            .menu-btn { width: auto; white-space: nowrap; margin-bottom: 0; }
            .nav-logo { display: none; }
            main { padding: 30px 20px 100px; }
        }
    </style>
</head>
<body>

    <div id="popup">
        <div class="popup-box">
            <span class="cerrar-popup" onclick="cerrarPopup()">✕</span>
            <img src="promo.jpg" alt="VFG Promo">
        </div>
    </div>

    <nav>
        <div class="nav-logo"><h1>VFG STORE</h1></div>
        <div class="menu-links">
            <button class="menu-btn active" onclick="navTo('home')">🏠 Inicio</button>
            <button class="menu-btn" onclick="navTo('ff')">💎 Free Fire</button>
            <button class="menu-btn" onclick="navTo('roblox')">🚀 Roblox</button>
            <button class="menu-btn" onclick="navTo('bs')">🔫 Block Strike</button>
            <button class="menu-btn" onclick="navTo('stream')">📺 Streaming</button>
            <button class="menu-btn" onclick="navTo('apps')">🛠️ Herramientas</button>
            <button class="menu-btn" onclick="navTo('ig')">📸 Instagram</button>
            <button class="menu-btn" onclick="navTo('tt')">🎵 TikTok</button>
            <button class="menu-btn" onclick="navTo('yt')">📹 YouTube</button>
            <button class="menu-btn" onclick="navTo('wsp')">🟢 WhatsApp</button>
        </div>
    </nav>

    <main id="mainView"></main>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3 id="m-name">Producto</h3>
            <p id="m-price" style="color:var(--accent); font-weight:800; margin: 15px 0;"></p>
            <input type="text" id="u-data" placeholder="Dato requerido">
            <select id="u-pay">
                <option value="">Selecciona Pago</option>
                <option>Mercado Pago</option>
                <option>Transferencia</option>
                <option>Binance (USDT)</option>
            </select>
            <button class="confirm-btn" onclick="executeOrder()">Confirmar WhatsApp</button>
            <button onclick="closeModal()" style="background:transparent; color:#444; border:none; width:100%; margin-top:15px; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script>
        const DB = {
            ff: {
                title: "Free Fire 💎", desc: "Diamantes oficiales.",
                groups: [
                    { name: "Stock por ID ✨", ph: "ID Jugador", items: [["100💎", "1.100"], ["341💎", "3.300"], ["572💎", "5.300"], ["1.166💎", "10.300"], ["2.398💎", "20.300"], ["6.160💎", "55.000"]] },
                    { name: "Infinitos ♾️", ph: "ID Jugador", items: [["100💎", "1.450"], ["300💎", "5.000"], ["500💎", "7.000"], ["1k💎", "12.680"], ["2k💎", "25.000"], ["6k💎", "60.000"]] },
                    { name: "Extra", ph: "ID Jugador", items: [["Pase Booyah", "3.500"]] }
                ]
            },
            roblox: {
                title: "Roblox 🚀", desc: "Robux via Gamepass.",
                groups: [
                    { name: "Robux", ph: "Usuario", items: [["100", "1.500"], ["400", "5.000"], ["800", "9.000"], ["1000", "12.000"], ["2000", "20.000"], ["4000", "370.000"]] }
                ]
            },
            bs: {
                title: "Block Strike 🔫", desc: "Oro para tu cuenta.",
                groups: [
                    { name: "Oro Block Strike", ph: "Usuario/ID BS", items: [["100 Oro", "1.200"], ["500 Oro", "4.500"], ["1000 Oro", "8.000"], ["2500 Oro", "15.000"], ["5000 Oro", "28.000"]] }
                ]
            },
            stream: {
                title: "Streaming 📺", desc: "Perfiles 4K.",
                groups: [
                    { name: "Cuentas", ph: "WhatsApp", items: [["Netflix", "8.000"], ["Disney+", "7.000"], ["Crunchyroll", "4.000"], ["HBO Max Est.", "7.000"], ["HBO Max Plat.", "7.500"], ["Paramount+", "5.500"], ["Apple TV", "13.000"]] }
                ]
            },
            apps: {
                title: "Apps & Herramientas 🛠️", desc: "Suscripciones Pro.",
                groups: [
                    { name: "Productividad", ph: "Email", items: [["Canva Mes", "6.500"], ["Canva Año", "50.000"], ["CapCut Pro", "7.000"], ["ChatGPT Mes", "5.500"], ["ChatGPT Año", "20.000"]] }
                ]
            },
            ig: {
                title: "Instagram 📸", desc: "Crecimiento IG.",
                groups: [
                    { name: "Seguidores", ph: "Link Perfil", items: [["100", "800"], ["300", "1.600"], ["500", "2.000"], ["1k", "3.500"], ["5k", "7.000"], ["10k", "10.000"], ["20k", "18.500"]] },
                    { name: "Likes", ph: "Link Post", items: [["100", "500"], ["300", "1k"], ["500", "1.5k"], ["1k", "2k"], ["5k", "5k"], ["10k", "10k"], ["20k", "18k"]] },
                    { name: "Vistas", ph: "Link Reel", items: [["1k", "500"], ["3k", "1k"], ["5k", "1.5k"], ["10k", "2k"], ["50k", "5.5k"], ["100k", "10k"], ["500k", "18k"]] }
                ]
            },
            tt: {
                title: "TikTok 🎵", desc: "Viralización.",
                groups: [
                    { name: "Seguidores", ph: "Usuario", items: [["100", "1.500"]] },
                    { name: "Likes", ph: "Link Video", items: [["100", "500"], ["300", "1k"], ["500", "1.5k"], ["1k", "2.5k"], ["5k", "7.5k"], ["10k", "15k"], ["20k", "17k"]] },
                    { name: "Vistas", ph: "Link Video", items: [["1k", "500"], ["3k", "1.5k"], ["5k", "1.7k"], ["10k", "3k"], ["50k", "5k"], ["100k", "8.5k"], ["500k", "30k"], ["1M", "50k"]] }
                ]
            },
            yt: {
                title: "YouTube 📹", desc: "Canal Pro.",
                groups: [
                    { name: "Subs", ph: "Link Canal", items: [["100", "1.500"], ["200", "3k"], ["300", "4.5k"], ["500", "7k"], ["1k", "15k"]] },
                    { name: "Likes", ph: "Link Video", items: [["100", "500"], ["500", "2k"], ["1k", "3k"], ["5k", "4.5k"], ["10k", "7k"]] },
                    { name: "Vistas", ph: "Link Video", items: [["500", "3k"], ["1k", "5.5k"], ["5k", "15k"], ["10k", "30k"]] }
                ]
            },
            wsp: {
                title: "WhatsApp 🟢", desc: "Canales.",
                groups: [
                    { name: "Miembros", ph: "Link Canal", items: [["50", "700"], ["100", "1.500"], ["200", "2.500"], ["500", "5k"], ["1k", "9.5k"]] },
                    { name: "Reacciones", ph: "Link Mensaje", items: [["50", "700"], ["100", "1k"], ["500", "5k"], ["1k", "7k"], ["5k", "25k"], ["10k", "50k"]] }
                ]
            }
        };

        function navTo(pageId) {
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            event?.currentTarget?.classList.add('active');
            const main = document.getElementById('mainView');
            if(pageId === 'home') {
                main.innerHTML = `<div class="page-content active"><div class="section-header"><h2>VFG STORE</h2><p>Servicios de alta gama.</p></div><div style="background:var(--card-bg); padding:50px; border-radius:30px; border:1px solid var(--accent); text-align:center;"><h2>Bienvenido</h2><p style="margin-top:20px; color:var(--text-dim)">Usa el menú para navegar.</p></div></div>`;
                return;
            }
            const data = DB[pageId];
            let html = `<div class="page-content active"><div class="section-header"><h2>${data.title}</h2><p>${data.desc}</p></div>`;
            data.groups.forEach(g => {
                html += `<div class="sub-category-title">${g.name}</div><div class="grid">`;
                g.items.forEach(i => {
                    html += `<div class="card"><span class="item-name">${i[0]}</span><span class="price">${i[1]}</span><button class="buy-btn" onclick="openOrder('${i[0]} ${data.title}', '${i[1]}', '${g.ph}')">Comprar</button></div>`;
                });
                html += `</div>`;
            });
            main.innerHTML = html + `</div>`;
            if(window.innerWidth < 950) window.scrollTo(0,0);
        }

        let curI = "", curP = "";
        function openOrder(n,p,ph) { 
            curI=n; curP=p; 
            document.getElementById('m-name').innerText=n; 
            document.getElementById('m-price').innerText="$"+p; 
            document.getElementById('u-data').placeholder=ph; 
            document.getElementById('orderModal').style.display='flex'; 
        }
        function closeModal() { document.getElementById('orderModal').style.display='none'; }
        function cerrarPopup() { document.getElementById('popup').style.display='none'; }
        function executeOrder() {
            const d = document.getElementById('u-data').value, p = document.getElementById('u-pay').value;
            if(!d || !p) return alert("Completa los datos");
            const msg = `🚀 *NUEVO PEDIDO VFG STORE*\n\n📦 *Producto:* ${curI}\n💰 *Monto:* $${curP}\n👤 *Dato:* ${d}\n💳 *Pago:* ${p}`;
            window.open(`https://wa.me/5492984706726?text=${encodeURIComponent(msg)}`, '_blank');
        }
        window.onload = () => navTo('home');
    </script>
</body>
</html>
