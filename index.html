<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VFG STORE | Elite Digital Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg: #020202;
            --card: rgba(10, 10, 10, 0.7);
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --grad: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            /* TRANSICIÓN RÁPIDA: 0.3 segundos */
            transition: background 0.3s ease-in-out; 
            position: relative;
        }

        /* Capa de oscurecimiento */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
            z-index: -1;
        }

        #main-popup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; backdrop-filter: blur(15px);
        }
        .popup-container { position: relative; max-width: 400px; width: 85%; animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .popup-container img { width: 100%; border-radius: 25px; border: 1px solid var(--border); box-shadow: 0 0 50px rgba(0,242,255,0.2); }
        .close-popup {
            position: absolute; top: -15px; right: -15px; background: var(--accent);
            color: #000; width: 35px; height: 35px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-weight: 800; cursor: pointer;
        }

        header {
            position: sticky; top: 0; width: 100%; z-index: 1000;
            background: rgba(2, 2, 2, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-container {
            max-width: 1400px; margin: 0 auto; display: flex; align-items: center; padding: 12px 20px; gap: 15px;
        }
        .logo { font-weight: 800; font-size: 1.3rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
        
        .menu-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .nav-btn {
            background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-dim);
            padding: 10px 18px; border-radius: 14px; cursor: pointer; font-weight: 600;
            white-space: nowrap; transition: 0.2s; font-size: 0.8rem;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-btn.active { background: #fff; color: #000; border: none; transform: scale(1.05); }

        .section-icon {
            width: 75px; height: 75px; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.6rem; border-radius: 22px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        main { max-width: 1200px; margin: 0 auto; padding: 40px 20px 100px; min-height: 100vh; }
        .section-intro { margin-bottom: 40px; text-align: center; animation: fadeIn 0.4s ease; }
        .section-intro h2 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }

        .cat-title { 
            font-size: 0.85rem; font-weight: 800; color: var(--accent); 
            text-transform: uppercase; margin: 45px 0 20px; letter-spacing: 2px;
            display: flex; align-items: center; gap: 15px;
        }
        .cat-title::after { content: ""; height: 1px; flex: 1; background: var(--border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
            backdrop-filter: blur(12px);
        }
        .card:hover { border-color: var(--item-color); transform: translateY(-5px); }

        .item-badge { 
            font-size: 0.65rem; font-weight: 800; color: #000; background: var(--item-color); 
            padding: 5px 12px; border-radius: 20px; width: fit-content; margin-bottom: 12px; 
            text-transform: uppercase; display: flex; align-items: center; gap: 6px;
        }
        .item-name { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .item-price { font-size: 1.8rem; font-weight: 800; margin: 12px 0 25px; color: #fff; }
        .item-price::before { content: "$"; font-size: 1.1rem; color: var(--item-color); margin-right: 4px; }

        .buy-btn {
            width: 100%; background: #fff; color: #000; border: none; padding: 14px;
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 0.8rem;
        }
        .buy-btn:hover { background: var(--item-color); color: #fff; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(15px); padding: 20px; }
        .modal { background: #080808; border: 1px solid var(--border); width: 100%; max-width: 420px; padding: 35px; border-radius: 30px; }
        input, select { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 14px; background: #121212; border: 1px solid var(--border); color: #fff; outline: none; }
        .confirm-btn { width: 100%; padding: 18px; border-radius: 14px; background: var(--grad); color: #fff; font-weight: 800; border: none; cursor: pointer; }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .section-intro h2 { font-size: 1.8rem; }
            .card { padding: 18px; }
        }
    </style>
</head>
<body>

    <div id="main-popup">
        <div class="popup-container">
            <span class="close-popup" onclick="closePopup()">✕</span>
            <img src="promo.jpg" alt="VFG STORE Ofertas">
        </div>
    </div>

    <header>
        <div class="nav-container">
            <div class="logo">VFG STORE</div>
            <div class="menu-scroll">
                <button class="nav-btn active" onclick="render('home')"><i class="fa-solid fa-house"></i> Inicio</button>
                <button class="nav-btn" onclick="render('ff')"><i class="fa-solid fa-fire"></i> Free Fire</button>
                <button class="nav-btn" onclick="render('roblox')"><i class="fa-solid fa-cube"></i> Roblox</button>
                <button class="nav-btn" onclick="render('bs')"><i class="fa-solid fa-gun"></i> Block Strike</button>
                <button class="nav-btn" onclick="render('ig')"><i class="fa-brands fa-instagram"></i> Instagram</button>
                <button class="nav-btn" onclick="render('tt')"><i class="fa-brands fa-tiktok"></i> TikTok</button>
                <button class="nav-btn" onclick="render('yt')"><i class="fa-brands fa-youtube"></i> YouTube</button>
                <button class="nav-btn" onclick="render('stream')"><i class="fa-solid fa-play"></i> Streaming</button>
                <button class="nav-btn" onclick="render('apps')"><i class="fa-solid fa-mobile-screen"></i> Apps</button>
                <button class="nav-btn" onclick="render('wsp')"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
            </div>
        </div>
    </header>

    <main id="app"></main>

    <div class="overlay" id="checkout">
        <div class="modal">
            <h3 id="m-title">Producto</h3>
            <p id="m-price" style="color:var(--accent); font-weight:800; margin: 10px 0 25px; font-size: 1.5rem;"></p>
            <input type="text" id="m-user" placeholder="Dato">
            <select id="m-pay">
                <option value="">Selecciona Pago</option>
                <option>Mercado Pago</option>
                <option>Transferencia</option>
                <option>Binance (USDT)</option>
            </select>
            <button class="confirm-btn" onclick="send()">Finalizar por WhatsApp</button>
            <button onclick="closeModal()" style="background:transparent; color:#555; width:100%; margin-top:15px; border:none; cursor:pointer; font-weight:700;">Regresar</button>
        </div>
    </div>

    <script>
        const DATA = {
            home: { 
                t: "VFG STORE", d: "Premium Digital Hub", icon: "fa-solid fa-gem", color: "#00f2ff", 
                img: "https://wallpaperaccess.com/full/1567831.jpg",
                rows: [{ n: "Novedades", ph: "Info", items: [["Consultar Servicio", "Gratis"]] }] 
            },
            ff: {
                t: "Free Fire", d: "Cargas por ID oficiales", icon: "fa-solid fa-fire", color: "#ff8c00",
                img: "https://images6.alphacoders.com/105/1051515.jpg",
                rows: [
                    { n: "Stock por ID ✨", ph: "ID Jugador", items: [["100💎", "1.100"], ["341💎", "3.300"], ["572💎", "5.300"]] }
                ]
            },
            roblox: {
                t: "Roblox", d: "Robux via Gamepass", icon: "fa-solid fa-cube", color: "#f0f0f0",
                img: "https://wallpapercave.com/wp/wp4013149.jpg",
                rows: [{ n: "Cargas", ph: "Usuario", items: [["100 Robux", "1.500"], ["400 Robux", "5.000"]] }]
            },
            bs: {
                t: "Block Strike", d: "Oro oficial", icon: "fa-solid fa-gun", color: "#3b82f6",
                img: "https://i.ytimg.com/vi/kCEnM8Y27hI/maxresdefault.jpg",
                rows: [{ n: "Oro", ph: "ID de BS", items: [["100 Oro", "1.200"]] }]
            },
            ig: {
                t: "Instagram", d: "Crecimiento Social", icon: "fa-brands fa-instagram", color: "#e1306c",
                img: "https://wallpapercave.com/wp/wp6164215.jpg",
                rows: [{ n: "Seguidores", ph: "Link Perfil", items: [["1k Seg", "3.500"]] }]
            },
            tt: {
                t: "TikTok", d: "Viraliza tu perfil", icon: "fa-brands fa-tiktok", color: "#ffffff",
                img: "https://wallpapercave.com/wp/wp6651877.png",
                rows: [{ n: "Social", ph: "Link Video", items: [["100k Vistas", "8.500"]] }]
            },
            yt: {
                t: "YouTube", d: "Crecimiento de Canal", icon: "fa-brands fa-youtube", color: "#ff0000",
                img: "https://wallpapercave.com/wp/wp2325493.jpg",
                rows: [{ n: "Subs", ph: "Link Canal", items: [["100 Subs", "1.500"]] }]
            },
            stream: {
                t: "Streaming", d: "Cuentas Privadas", icon: "fa-solid fa-play", color: "#a855f7",
                img: "https://wallpapercave.com/wp/wp3668385.jpg",
                rows: [{ n: "Plataformas", ph: "WhatsApp", items: [["Netflix", "8.000"]] }]
            },
            apps: {
                t: "Apps Pro", d: "Premium", icon: "fa-solid fa-mobile-screen", color: "#10b981",
                img: "https://wallpapercave.com/wp/wp4522437.jpg",
                rows: [{ n: "Suscripciones", ph: "Correo", items: [["ChatGPT Mes", "5.500"]] }]
            },
            wsp: {
                t: "WhatsApp", d: "Miembros", icon: "fa-brands fa-whatsapp", color: "#25d366",
                img: "https://wallpapercave.com/wp/wp7169420.jpg",
                rows: [{ n: "Servicios", ph: "Link Canal", items: [["1k Miembros", "9.500"]] }]
            }
        };

        function closePopup() { document.getElementById('main-popup').style.display = 'none'; }

        function render(id) {
            const app = document.getElementById('app');
            const data = DATA[id];
            
            // Cambio de imagen inmediato (0.3s definido en CSS)
            if(data.img) {
                document.body.style.backgroundImage = `url('${data.img}')`;
            }

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(window.event && window.event.currentTarget.classList) {
                window.event.currentTarget.classList.add('active');
            }

            let html = `
                <div class="section-intro">
                    <div class="section-icon" style="color:${data.color}; border-color:${data.color}55">
                        <i class="${data.icon}"></i>
                    </div>
                    <h2 style="color:${data.color}">${data.t}</h2>
                    <p>${data.d}</p>
                </div>`;

            data.rows.forEach(r => {
                html += `<div class="cat-title" style="color:${data.color}">${r.n}</div><div class="grid">`;
                r.items.forEach(i => {
                    html += `
                        <div class="card" style="--item-color: ${data.color}">
                            <div class="item-badge" style="background:${data.color}">
                                <i class="${data.icon}"></i> ${data.t}
                            </div>
                            <div class="item-name">${i[0]}</div>
                            <div class="item-price">${i[1]}</div>
                            <button class="buy-btn" onclick="openMod('${i[0]} ${data.t}', '${i[1]}', '${r.ph}')">Comprar</button>
                        </div>`;
                });
                html += `</div>`;
            });
            app.innerHTML = html;
            window.scrollTo({top: 0}); // Sin smooth para que sea más rápido
        }

        let selI, selP;
        function openMod(n, p, ph) {
            selI = n; selP = p;
            document.getElementById('m-title').innerText = n;
            document.getElementById('m-price').innerText = "$" + p;
            document.getElementById('m-user').placeholder = "Ingresa tu " + ph;
            document.getElementById('checkout').style.display = 'flex';
        }

        function closeModal() { document.getElementById('checkout').style.display = 'none'; }

        function send() {
            const u = document.getElementById('m-user').value;
            const p = document.getElementById('m-pay').value;
            if(!u || !p) return alert("⚠️ Por favor completa los campos");
            const msg = `🚀 *PEDIDO VFG STORE*\n📦 *Servicio:* ${selI}\n💰 *Monto:* $${selP}\n👤 *Dato:* ${u}\n💳 *Pago:* ${p}`;
            window.open(`https://wa.me/5492984706726?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => render('home');
    </script>
</body>
</html>
